<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Threadly</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <h1>Threadly</h1>
        <span id="platformLabel" class="platform-label"></span>
      </div>
      <button id="refresh" class="icon-btn" title="Refresh">&#8635;</button>
    </div>

    <div id="status">Loading…</div>

    <div id="summary" class="hidden">
      <div class="chat-info">
        <div id="title" class="title"></div>
        <div id="meta" class="meta"></div>
      </div>

      <div id="usageSection" class="section hidden">
        <div class="section-label">Your usage limits</div>
        <div class="usage-row">
          <div class="usage-row-header">
            <span>Current session</span>
            <span id="sessionPct"></span>
          </div>
          <div class="usage-bar"><div id="sessionBar" class="usage-bar-fill"></div></div>
          <div class="usage-caption" id="sessionReset"></div>
        </div>
        <div class="usage-row">
          <div class="usage-row-header">
            <span>Weekly limit</span>
            <span id="weeklyPct"></span>
          </div>
          <div class="usage-bar"><div id="weeklyBar" class="usage-bar-fill"></div></div>
          <div class="usage-caption" id="weeklyReset"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Continue this chat in</div>
        <div id="continueButtons" class="continue-buttons"></div>
        <div id="continueStatus"></div>
        <div class="continue-caption">
          Threadly opens the destination tab and pastes the conversation into its input automatically.
        </div>
      </div>

      <div class="section advanced">
        <div class="section-label">Custom handoff</div>
        <label class="budget-label">
          Token budget
          <input type="number" id="tokenBudget" value="800" min="100" step="100" />
        </label>
        <button id="generate">Generate Handoff</button>
        <div id="generateStatus"></div>

        <div id="resultBlock" class="hidden">
          <textarea id="result" readonly rows="8"></textarea>
          <button id="copy">Copy to clipboard</button>
        </div>
      </div>

      <div class="footer">
        <span id="updatedAt" class="updated"></span>
        <div class="footer-links">
          <button id="openLibrary" class="link">Library</button>
          <button id="openOptions" class="link">Settings</button>
        </div>
      </div>
    </div>

    <script src="../lib/storage.js"></script>
    <script src="../lib/pasteTargets.js"></script>
    <script src="../lib/tokenEstimate.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
