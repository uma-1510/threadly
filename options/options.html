<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Threadly Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 420px;
        margin: 40px auto;
        color: #1a1a1a;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
        margin-top: 16px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
      }
      .hint {
        color: #666;
        font-size: 12px;
        margin-top: 2px;
      }
      button {
        margin-top: 20px;
        padding: 6px 14px;
      }
      #status {
        display: inline-block;
        margin-left: 10px;
        color: #2a7a2a;
      }
    </style>
  </head>
  <body>
    <h1>Threadly Settings</h1>

    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
    <div class="hint">Stored locally in this browser only, never sent anywhere but Google's API.</div>

    <label for="model">Model</label>
    <input type="text" id="model" placeholder="e.g. gemini-2.0-flash" autocomplete="off" />
    <div class="hint">Must match a model id available on your Gemini API key.</div>

    <button id="save">Save</button>
    <span id="status"></span>

    <script src="../lib/storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
